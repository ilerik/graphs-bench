name: CI

on:
  push:
    branches: [master, main, publication-prep]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lean
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: formal/lean

      - name: Build Lean (incl. fixture guards)
        run: |
          cd formal/lean
          lake exe cache get
          lake build Sssp.Refine.Verification Sssp.Fixtures.Correctness

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy

      - name: Rust format
        run: cargo fmt --check

      - name: Rust clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --release
