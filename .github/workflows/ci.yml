name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lean
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: formal/lean

      - name: Build Lean (incl. fixture guards)
        run: |
          cd formal/lean
          lake exe cache get
          lake build Sssp.Fixtures.Correctness

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust fixture tests
        run: cargo test shared_json_fixtures
